global
  maxconn 50000
	log /dev/log	local0
	#log /dev/log	local1 notice
	chroot /var/lib/haproxy
	#stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
	#stats timeout 30s
	user haproxy
	group haproxy
	daemon
	#nbproc 3
	nbthread 7
	cpu-map auto:1/1-4 0-3
	# Default SSL material locations
	ca-base /etc/ssl/certs
	crt-base /etc/ssl/private
	# See: https://ssl-config.mozilla.org/#server=haproxy&server-version=2.0.3&config=intermediate
	# old configuration
	ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA256:ECDHE-ECDSA-AES128-SHA:ECDHE-RSA-AES128-SHA:ECDHE-ECDSA-AES256-SHA384:ECDHE-RSA-AES256-SHA384:ECDHE-ECDSA-AES256-SHA:ECDHE-RSA-AES256-SHA:DHE-RSA-AES128-SHA256:DHE-RSA-AES256-SHA256:AES128-GCM-SHA256:AES256-GCM-SHA384:AES128-SHA256:AES256-SHA256:AES128-SHA:AES256-SHA:DES-CBC3-SHA
	ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
	ssl-default-bind-options no-sslv3 no-tls-tickets
	ssl-default-server-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA256:ECDHE-ECDSA-AES128-SHA:ECDHE-RSA-AES128-SHA:ECDHE-ECDSA-AES256-SHA384:ECDHE-RSA-AES256-SHA384:ECDHE-ECDSA-AES256-SHA:ECDHE-RSA-AES256-SHA:DHE-RSA-AES128-SHA256:DHE-RSA-AES256-SHA256:AES128-GCM-SHA256:AES256-GCM-SHA384:AES128-SHA256:AES256-SHA256:AES128-SHA:AES256-SHA:DES-CBC3-SHA
	ssl-default-server-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
	ssl-default-server-options no-tlsv10 no-tlsv11 no-sslv3 no-tls-tickets
	tune.ssl.default-dh-param 2048
defaults
  log global
  mode http
  errorfile 400 /etc/haproxy/errors/400.http
  errorfile 403 /etc/haproxy/errors/403.http
  errorfile 408 /etc/haproxy/errors/408.http
  errorfile 500 /etc/haproxy/errors/500.http
  errorfile 502 /etc/haproxy/errors/502.http
  errorfile 503 /etc/haproxy/errors/503.http
  errorfile 504 /etc/haproxy/errors/504.http
  option httplog
  option dontlognull
listen stats
  bind *:8080
  stats enable
  stats hide-version
  stats realm   Haproxy\ Statistics
  stats uri /haproxy?stats
  stats auth NomsStats:5rdx^TFC7ygv
  timeout client  70s
cache mycache
   total-max-size 4095
   max-object-size 10000
   max-age 30
frontend http-in
#  bind *:80
  bind *:443 ssl crt /etc/ssl/certs/granot.pem  alpn h2,http/1.1,http/1.0
  option forwardfor
  default_backend servers
  #option httplog
  #option dontlognull
  # Any URL beginning with socket.io will be flagged as 'is_websocket'
  acl is_websocket path_beg /socket.io
  acl static_server path_beg /assets
  acl is_websocket hdr(Upgrade) -i WebSocket
  acl is_websocket hdr_beg(Host) -i ws
  redirect prefix https://www.ranusha.com code 301 if { hdr(host) -i ranusha.com }
  acl webserver_rule1 hdr(host) -i www.ranusha.com
  #acl webserver_rule2 hdr(host) -i foreman.ranusha.com
  # acl is_appserver hdr(host) -i bart.ranusha.com
  # The connection to use if 'is_websocket' is flagged
  #use_backend omsSockets if is_websocket
  use_backend website if webserver_rule1
  acl is_aiagent path_beg /aiagent
  use_backend aiagent if is_aiagent
  # nodeWmove (FoxPro -> Node migration) on wmove.ranusha.com
  acl is_wmove hdr(host) -i wmove.ranusha.com
  use_backend nodewmove if is_wmove
  #use_backend foremanapp if webserver_rule2
  #use_backend staticServers if static_server
  timeout client  70000
backend servers
  timeout server  50s
  timeout connect 28s
  timeout check 5s
  option httpchk GET /stats?haproxy=1
  balance leastconn
  option  persist
  option redispatch
  cookie io prefix indirect nocache
  server noms31_p3000 192.168.1.83:3000 maxconn 1000 weight 10 cookie goms check inter 10000 rise 1 fall 3 ssl verify none
  server noms31_p3001 192.168.1.83:3001 maxconn 1000 weight 10 cookie goms check inter 10000 rise 1 fall 3 ssl verify none
  server noms32_p3000 192.168.1.121:3000 maxconn 1000 weight 10 cookie goms check inter 10000 rise 1 fall 3 ssl verify none
  server noms32_p3001 192.168.1.121:3001 maxconn 1000 weight 10 cookie goms check inter 10000 rise 1 fall 3 ssl verify none
backend website
  # Use mycache for all requests
  http-request cache-use mycache
   # Store http requests in cache
  http-response cache-store mycache
  timeout server  50s
  timeout connect 28s
  timeout check 5s
  option httpchk GET /stats?haproxy=1
  balance leastconn
  option  persist
  option redispatch
  cookie io prefix indirect nocache
  server noms31_p4000 192.168.1.83:4000 maxconn 1000 weight 10 cookie gwww check inter 10000 rise 1 fall 3 ssl verify none
  server noms32_p4000 192.168.1.121:4000 maxconn 1000 weight 10 cookie gwww check inter 10000 rise 1 fall 3 ssl verify none
backend omsSockets
  mode http
  timeout check 5000
  timeout connect 28000
  timeout server  50000
  option httpchk HEAD /stats?haproxy=1
  http-check expect status 200
  cookie io prefix indirect nocache
  balance leastconn
  option persist
  option forwardfor
  option redispatch
  # option http-server-close
  # option httpclose
  # option httpchk HEAD /health
  server noms31_p3000 192.168.1.83:3000 maxconn 1000 weight 10 cookie omsWs3000 check inter 10000 rise 1 fall 3 ssl verify none
  server noms31_p3001 192.168.1.83:3001 maxconn 1000 weight 10 cookie omsWs3001 check inter 10000 rise 1 fall 3 ssl verify none
  server noms32_p3000 192.168.1.121:3000 maxconn 1000 weight 10 cookie omsWs3000 check inter 10000 rise 1 fall 3 ssl verify none
  server noms32_p3001 192.168.1.121:3001 maxconn 1000 weight 10 cookie omsWs3001 check inter 10000 rise 1 fall 3 ssl verify none
backend staticServers
  mode http
  timeout check 5000
  timeout connect 28000
  timeout server  50000
  option httpchk HEAD /
  http-check expect status 200
  balance roundrobin
  cookie HAPROXY_COOKIE insert indirect nocache
  server static1 192.168.1.125:80 check
backend aiagent
  mode http
  timeout server  180s          # was 60s — Claude tool-use loops can run 60-120s
  timeout connect 10s
  option httpchk GET /api/agents
  http-check expect status 200
  http-request replace-path ^/aiagent(/.*)$ \1
  server noms32_p3978 192.168.1.121:3978 maxconn 200 check inter 10000 rise 1 fall 3 ssl verify none
backend nodewmove
  # wmove.ranusha.com -> nodeWmove (Express) on noms31, HTTPS on 6443.
  # HAProxy re-encrypts to the backend; 'ssl verify none' accepts its self-signed cert.
  timeout server  50s
  timeout connect 28s
  timeout check 5s
  option forwardfor
  option httpchk GET /healthz
  http-check expect status 200
  balance leastconn
  option  persist
  option redispatch
  cookie io prefix indirect nocache
  server noms31_p6443 192.168.1.83:6443 maxconn 1000 weight 10 cookie nwm check inter 10000 rise 1 fall 3 ssl verify none
