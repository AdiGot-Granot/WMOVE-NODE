# HAProxy in front of nodeWmove.
#
# Pattern: HAProxy terminates TLS on :443 and forwards plain HTTP to Node on an
# internal port. Node itself runs HTTP (HTTPS_ENABLED=false) and trusts the proxy.
#
# HAProxy needs the cert as a single PEM (cert + key). Convert the PFX once:
#   openssl pkcs12 -in granot2026.pfx -nodes -out /etc/haproxy/certs/granot2026.pem
#   chmod 600 /etc/haproxy/certs/granot2026.pem
#
# Reload after changes:  haproxy -c -f ops/haproxy.cfg  &&  systemctl reload haproxy

global
    log /dev/log local0
    maxconn 4096
    tune.ssl.default-dh-param 2048

defaults
    mode http
    log global
    option httplog
    option forwardfor          # adds X-Forwarded-For (Node reads req.ip from it)
    option http-server-close
    timeout connect 5s
    timeout client  30s
    timeout server  30s

# ── Redirect plain HTTP to HTTPS ───────────────────────────────────────────
frontend http_in
    bind *:80
    http-request redirect scheme https unless { ssl_fc }

# ── TLS termination ────────────────────────────────────────────────────────
frontend https_in
    bind *:443 ssl crt /etc/haproxy/certs/granot2026.pem
    http-request set-header X-Forwarded-Proto https

    # Strangler routing: migrated paths → Node, everything else → legacy app.
    # Add a path prefix here each time you migrate a module.
    acl migrated path_beg /mplogin /mamenu /mpest/inventory /mpest/indexwc /zz/ /healthz
    use_backend nodewmove if migrated
    default_backend legacy_wc

# ── Backends ───────────────────────────────────────────────────────────────
backend nodewmove
    option httpchk GET /healthz
    server node1 127.0.0.1:8080 check
    # scale out: add more node procs (PM2 cluster) on different ports
    # server node2 127.0.0.1:8081 check

backend legacy_wc
    # The existing West Wind / IIS app (wc.dll). Remove once migration completes.
    server legacy1 127.0.0.1:8000 check
