# Strangler reverse proxy for the wMove migration.
# Migrated module paths go to the Node app; everything else stays on the
# legacy West Wind / VFP app behind wc.dll. Flip a location to roll a module
# forward; comment it out to roll back instantly.

upstream nodewmove { server 127.0.0.1:3000; }
upstream legacy_wc  { server 127.0.0.1:8080; }   # IIS / wc.dll

server {
    listen 80;
    server_name gmove.granot.com;

    # ── Migrated to Node (Phase 1a POC) ──────────────────────────────
    location /mpest/inventory { proxy_pass http://nodewmove; }
    # location /mpest/        { proxy_pass http://nodewmove; }   # enable when MPEST fully migrated

    # Static assets can be served by Node or straight from disk (D:\web).
    location /zz/ { proxy_pass http://nodewmove; }

    # ── Everything else → legacy app ─────────────────────────────────
    location / {
        proxy_pass http://legacy_wc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
