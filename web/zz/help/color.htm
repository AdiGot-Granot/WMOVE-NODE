function SelectColor(thecolor){

function ChangeColor(thecolor){

document.showcolor.hexcolor.value="#" + thecolor;

}

for(d=0;d<=5;d++){
for(i=0;i<=5;i++){
currcolor=hexbase[d] + hexbase[i] + hexbase[b];
document.write("<td style=\"cursor:hand; width:10px; height:10px;\" onClick=\"SelectColor('" + currcolor + "');\" onMousemove=\"ChangeColor('" + currcolor + "');\" bgcolor=\"#" + currcolor + "\"></td>");
}
for(j=0;j<=5;j++){

currcolor=hexbase[d] + hexbase[b+3] + hexbase[j];

 }
